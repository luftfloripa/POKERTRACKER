<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo.css">
    <title>Login - PokerTracker</title>
</head>
<body class="pagina-login">

<div class="login-card">
    <div class="login-logo">
        <span class="naipe-espadas">♠</span>
        <span class="naipe-copas">♥</span>
        <span class="naipe-paus">♣</span>
        <span class="naipe-ouros">♦</span>
        <br>PokerTracker
    </div>

    <div class="login-subtitulo">Acesso Restrito</div>

    <form id="formLogin" class="form-empilhado form-login">
        <input type="text" id="email" class="input-login" placeholder="E-mail" required>
        <input type="password" id="senha" class="input-login" placeholder="Sua Senha" required>

        <button type="submit" class="btn-login mt-20">ENTRAR</button>
    </form>

    <p id="msgErro" class="mt-20 msg-erro hidden">E-mail ou senha incorretos. ❌</p>
</div>

<script src="js/login.js"></script>
</body>
</html>
